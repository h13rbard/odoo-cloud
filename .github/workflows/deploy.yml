name: "🚀 Odoo 17 Production Deployment Pipeline (Azure)"

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # =======================================================
  # ETAPA 1: INFRAESTRUCTURA COMO CÓDIGO (TERRAFORM)
  # =======================================================
  terraform:
    name: "🏗️ Provision Infrastructure"
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CREDENTIALS && fromJSON(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CREDENTIALS && fromJSON(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_CREDENTIALS && fromJSON(secrets.AZURE_CREDENTIALS).tenantId }}

    outputs:
      public_ip: ${{ steps.get_ip.outputs.VM_IP }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      # 🔄 Intentar recuperar el estado anterior si existe para evitar colisiones
      - name: Terraform Apply
        run: |
          cd terraform
          terraform import azurerm_resource_group.rg /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-odoo-production || echo "El recurso ya estaba importado o no fue necesario"
          terraform apply -auto-approve 

      - name: Extract Public IP Output
        id: get_ip
        run: |
          cd terraform
          IP=$(terraform output -raw public_ip_address)
          echo "VM_IP=$IP" >> $GITHUB_OUTPUT
          echo "🚀 La IP Pública asignada en Azure es: $IP"

          
# =======================================================
  # ETAPA 2: CONFIGURACIÓN SRE & DESPLIEGUE DOCKER (GITOPS)
  # =======================================================
  deploy:
    name: "🐳 Deploy Application & Hardening"
    needs: terraform
    runs-on: ubuntu-latest
    # 🔐 Forzamos al job a heredar explícitamente todos los secretos del repositorio
    environment: production 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Ejecutamos el despliegue usando la inyección directa y limpia de la llave
      - name: Execute Remote Deployment via SSH (Rocky Linux 9)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.public_ip }}
          username: "azureuser"
          # Usamos comillas para obligar a GitHub a pasar el bloque multilinea intacto
          key: "${{ secrets.SSH_PRIVATE_KEY }}"
          port: 22
          script: |
            echo "========================================================="
            echo "🛡️ INICIANDO HARDENING Y CONFIGURACIÓN EN ROCKY LINUX 9"
            echo "========================================================="
            
            # 1. Actualizar repositorio e instalar dependencias base
            sudo dnf update -y
            sudo dnf install -y yum-utils git git-core curl
            
            # 2. Instalar Docker y Docker Compose de forma segura
            sudo dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
            sudo dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            
            # 3. Habilitar y encender servicios
            sudo systemctl enable --now docker
            
            # 4. Clonación limpia del proyecto (Evita problemas de propiedad de Git)
            echo "📦 Actualizando fuentes del proyecto..."
            rm -rf ~/app/odoo-cloud
            mkdir -p ~/app
            git clone https://github.com/${{ github.repository }}.git ~/app/odoo-cloud
            cd ~/app/odoo-cloud

            # 5. Levantar la pila de contenedores (Odoo, Postgres, Nginx)
            echo "🐳 Verificando entorno Docker..."
            if [ -d "docker" ]; then
              cd docker
              sudo docker compose down --remove-orphans
              sudo docker compose up -d --build
            else
              echo "❌ Error Crítico: No se encontró la carpeta docker/ en el repositorio clonado."
              ls -la ~/app/odoo-cloud
              exit 1
            fi
                        
            echo "========================================================="
            echo "✅ CONTENEDORES LEVANTADOS Y CONFIGURADOS CON ÉXITO"
            echo "========================================================="
